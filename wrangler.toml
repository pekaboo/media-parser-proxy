name = "media-parser-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = []

[observability]
enabled = true

[vars]
DEFAULT_TIMEOUT_MS = "30000"

# KV namespace：风控冷却器使用
[[kv_namespaces]]
binding = "COOLDOWN_KV"
id = "e02b48c707aa4e529d45f8f8dbf0124e"

# 自定义域名绑定（自动管理 DNS + SSL 证书）
routes = [
  { pattern = "media.wangyitu.tech", custom_domain = true }
]
